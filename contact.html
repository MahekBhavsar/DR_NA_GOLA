<!DOCTYPE html>
<html lang="gu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Doctor Na Gola</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">

  <!-- Firebase SDKs -->

  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

  <!-- CSS -->

</head>

<body>

  <!-- Navbar -->
  <nav id="navbar"></nav>

  <!-- Header -->
  <header class="page-header fade-in" style="padding: 5rem 0 2rem;">
    <div class="container">
      <h1 data-t="contact_title">Contact Us</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="section" style="padding-top: 0; min-height: 50vh;">

                </svg>
              </div>
              <div class="contact-card-text">
                <h4 data-t="contact_visit">Visit Our Shop</h4>
                <p data-t="brand_address">Tithal Road, Opp. Sardar Heights, Valsad</p>
              </div>
            </div>

            <div class="contact-card" style="transition-delay: 0.1s;">
              <div class="contact-card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"

                </svg>
              </div>
              <div class="contact-card-text">
                <h4 data-t="contact_call">Call Us</h4>
                <p><span data-t="brand_owner">Mohit Vachhani</span> &mdash; <a href="tel:+919712211599"
                    style="color:var(--primary-700); font-weight:700;"><span data-t="brand_phone">97122 11599</span></a>
                </p>
              </div>
            </div>

            <div class="contact-card" style="transition-delay: 0.2s;">
              <div class="contact-card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                  stroke="var(--primary-700)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
              </div>
              <div class="contact-card-text">
                <h4 data-t="contact_hours">Opening Hours</h4>
                <p data-t="contact_hours_val">7:30 PM – 12:15 AM (Every day)</p>
              </div>
            </div>

          </div>

          <!-- Social Media Links -->
          <div class="contact-social-row">
            <a href="https://www.instagram.com/doctor_na_gola_valsad?igsh=cWx2ZGttYnI4Zjhr" target="_blank"
              class="contact-social-link instagram">

              </svg>
              Instagram

                  d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />

          </div>

          <div class="map-embed fade-in" style="transition-delay: 0.3s;">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3724.1!2d72.9105943!3d20.603307!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be0c3004cd2d603%3A0x910e555637239d40!2sDoctor%20na%20Gola!5e0!3m2!1sen!2sin!4v1749380000000!5m2!1sen!2sin"
              width="100%" height="300" style="border:0; display:block;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>

        <!-- Right: Form -->
        <div class="fade-in" style="transition-delay: 0.2s;">
          <div class="card">
            <h3 style="margin-bottom: 1.5rem; color: var(--text);" data-t="contact_form_title">Send us a Message</h3>

            <form onsubmit="submitContact(event)">
              <div class="form-group">
                <label data-t="contact_form_name">Your Name</label>
                <input type="text" id="contactName" class="form-input" required data-t="contact_form_name"
                  placeholder="Your Name">
              </div>

              <div class="form-group">
                <label data-t="contact_form_phone">Phone Number</label>
                <input type="tel" id="contactPhone" class="form-input" required pattern="[0-9]{10}"
                  data-t="contact_form_phone" placeholder="Phone Number">
              </div>

              <div class="form-group">
                <label data-t="contact_form_msg">Your Message</label>
                <textarea id="contactMsg" class="form-input" required data-t="contact_form_msg"
                  placeholder="Your Message"></textarea>
              </div>

              <button type="submit" class="btn btn-primary btn-block" id="submitContactBtn">
                ✉️ <span data-t="contact_form_send">Send Message</span>
              </button>
            </form>
          </div>
        </div>

      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer id="footer"></footer>

  <!-- JS -->
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar('contact');
      renderFooter();
    });

    async function submitContact(e) {
      e.preventDefault();
      const btn = document.getElementById('submitContactBtn');
      const originalText = btn.innerHTML;

      const name = document.getElementById('contactName').value;
      const phone = document.getElementById('contactPhone').value;
      const msg = document.getElementById('contactMsg').value;

      btn.innerHTML = `<span data-t="common_loading">${t('common_loading')}</span>...`;
      btn.disabled = true;

      try {
        await DB.pushContact({
          name, phone, message: msg, timestamp: Date.now()
        });

        showToast(currentLang === 'gu' ? '✅ મેસેજ મોકલવામાં આવ્યો છે!' : '✅ Message sent successfully!');

        // Reset
        document.getElementById('contactName').value = '';
        document.getElementById('contactPhone').value = '';
        document.getElementById('contactMsg').value = '';

      } catch (error) {
        showToast('Error sending message', 'error');
        console.error(error);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>

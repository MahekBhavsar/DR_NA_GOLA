<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Doctor Na Gola</title>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar"></nav>

  <header class="page-header fade-in" style="padding: 4rem 1rem 2rem;">
    <div class="container" style="max-width: 600px;">
      <h1>Track Your Order</h1>
      <p>Enter your phone number or Order ID to see the status.</p>
    </div>
  </header>

  <main class="section" style="padding-top: 0; min-height: 50vh;">
    <div class="container" style="max-width: 600px;">
      
      <div class="form-group fade-in">
        <label>Phone Number or Order ID</label>
        <div style="display: flex; gap: 0.5rem;">
          <input type="text" id="trackInput" class="form-input" placeholder="e.g. 9876543210 or DR-5X9Q" onkeyup="if(event.key==='Enter') searchOrder()">
          <button class="btn btn-primary" onclick="searchOrder()">🔍 Search</button>
        </div>
      </div>

      <div id="trackResult" style="margin-top: 2rem; display: none;" class="fade-in">
        <!-- Results will be injected here -->
      </div>
      
      <div id="trackLoader" style="display: none; text-align: center; margin-top: 2rem;">
        <p>Loading...</p>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer id="footer"></footer>

  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/track.js"></script>
</body>
</html>
